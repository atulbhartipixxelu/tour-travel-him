<!doctype html>
<html lang="en" class="dark" data-color="gold">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="WanderHive.com — AI-powered travel platform for Himachal Pradesh. Book hotels, tours, rentals, and plan your perfect journey." />
    <meta name="theme-color" content="#050810" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Figtree:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
    <title>WanderHive.com | Smart Travel & Tourism Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      try {
        var t = localStorage.getItem('wanderhive-theme') || localStorage.getItem('tripverse-theme');
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(t === 'light' ? 'light' : 'dark');
        var c = localStorage.getItem('wanderhive-color') || localStorage.getItem('tripverse-color');
        document.documentElement.setAttribute('data-color', c || 'gold');
      } catch (e) {
        document.documentElement.classList.add('dark');
        document.documentElement.setAttribute('data-color', 'gold');
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
